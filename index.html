let currentSort = 'default';
let currentClass = 'all';
let showBestOnly = true;

function setSort(sort){ currentSort = sort; setActive('sort', sort); render(); }
function setClass(cls){ currentClass = cls; setActive('class', cls); render(); }

function toggleBest(cb){
  showBestOnly = cb.checked;
  render();
}

function setActive(type, value){
  document.querySelectorAll(`button[data-${type}]`).forEach(b=>b.classList.remove('active'));
  document.querySelector(`button[data-${type}="${value}"]`).classList.add('active');
}

function getBestAttempts(entries) {
  const bestMap = {};
  const attemptCountMap = {};
  const bestAttemptNumberMap = {};

  entries.forEach(e => {
    const key = `${e.name}__${e.class}`;
    
    // Count total attempts
    if (!attemptCountMap[key]) {
      attemptCountMap[key] = 0;
    }
    attemptCountMap[key]++;
    
    if (!bestMap[key]) {
      bestMap[key] = e;
      bestAttemptNumberMap[key] = e.tentativa;
      return;
    }

    // Melhor tentativa: mais condutores, depois melhor tempo
    if (
      e.wires > bestMap[key].wires ||
      (e.wires === bestMap[key].wires && e.totalSeconds < bestMap[key].totalSeconds)
    ) {
      bestMap[key] = e;
      bestAttemptNumberMap[key] = e.tentativa;
    }
  });

  // Add attempt count and best attempt number to best entries
  Object.entries(bestMap).forEach(([key, entry]) => {
    entry.totalAttempts = attemptCountMap[key];
    entry.bestAttemptNumber = bestAttemptNumberMap[key];
  });

  return Object.values(bestMap);
}

  name = decodeURIComponent(name);
  const overlay = document.getElementById('studentOverlay');
  const title = document.getElementById('studentName');
  const list = document.getElementById('attemptsList');
  const canvas = document.getElementById('attemptChart');

  const attempts = data.filter(d => d.name===name).sort((a,b)=>a.tentativa-b.tentativa);
  title.textContent = name + ' — Progresso';
  list.innerHTML = '';
  if(attempts.length===0){ list.innerHTML = '<li>Nenhuma tentativa encontrada.</li>'; }
  attempts.forEach(a=>{
    const li = document.createElement('li');
    li.textContent = `${a.tentativa}ª — ${a.minutes}m ${a.seconds}s — ${a.wires}/8 — ${a.date} (${a.class})`;
    list.appendChild(li);
  });

  drawAttemptChart(canvas, attempts);
  overlay.style.display = 'flex';
}

function closeStudent(){ document.getElementById('studentOverlay').style.display='none'; }

function drawAttemptChart(canvas, attempts){
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0,0,canvas.width,canvas.height);
  if(!attempts || attempts.length===0) return;

  const padding = {l:40,r:20,t:20,b:30};
  const w = canvas.width - padding.l - padding.r;
  const h = canvas.height - padding.t - padding.b;

  const xs = attempts.map(a=>a.tentativa);
  const ys = attempts.map(a=>a.totalSeconds);
  const minY = Math.min(...ys);
  const maxY = Math.max(...ys);

  const scaleX = i => padding.l + ((i-1)/(8-1))*w;
  // Invert Y so lower times appear lower on the canvas
  const scaleY = v => padding.t + h - ( (v - minY) / (maxY - minY || 1) ) * h;

  // Draw axes
  ctx.strokeStyle = '#666'; ctx.lineWidth=1; ctx.beginPath();
  ctx.moveTo(padding.l,padding.t); ctx.lineTo(padding.l,padding.t+h); ctx.lineTo(padding.l+w,padding.t+h); ctx.stroke();

  // Draw labels and grid (light color for dark modal)
  ctx.fillStyle='#e0e0e0'; ctx.font='12px Poppins, sans-serif';
  for(let i=1;i<=8;i++){
    const x = scaleX(i);
    ctx.fillText(i+'ª', x-8, padding.t+h+18);
  }

  // Plot line
  ctx.beginPath();
  attempts.forEach((a,idx)=>{
    const x = scaleX(a.tentativa);
    const y = scaleY(a.totalSeconds);
    if(idx===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  });
  ctx.strokeStyle='#1f77b4'; ctx.lineWidth=2; ctx.stroke();

  // Points
  attempts.forEach(a=>{
    const x = scaleX(a.tentativa);
    const y = scaleY(a.totalSeconds);
    // color by wires
    const color = a.wires===8? '#2ca02c' : (a.wires===0? '#d62728' : '#ff7f0e');
    ctx.fillStyle = color;
    ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#e0e0e0'; ctx.font='11px Poppins, sans-serif';
    ctx.fillText(`${a.minutes}m ${a.seconds}s`, x+8, y-6);
  });
}

// Delegate clicks to student links
document.addEventListener('click', e=>{
  const a = e.target.closest && e.target.closest('.student-link');
  if(a){ e.preventDefault(); openStudent(a.dataset.name); }
});

function render(){
  // 1) Filtrar por turma
  let filtered = currentClass==='all'
    ? [...data]
    : data.filter(d=>d.class===currentClass);

  // 2) Conditionally manter apenas a melhor tentativa por aluno (por turma)
  if (showBestOnly) {
    filtered = getBestAttempts(filtered);
  }

  // 3) Ordenar dentro da turma
  filtered.sort((a,b)=>{
    if(currentSort==='time') return a.totalSeconds-b.totalSeconds;
    if(currentSort==='date') return new Date(b.date.split('/').reverse().join('-')) - new Date(a.date.split('/').reverse().join('-'));
    if(b.wires!==a.wires) return b.wires-a.wires;
    return a.totalSeconds-b.totalSeconds;
  });

  tbody.innerHTML='';

  // 4) Ranking POR TURMA (reset automático ao filtrar)
  filtered.forEach((e,i)=>{
    const tr=document.createElement('tr');
    if(e.wires===8) tr.classList.add('perfect');
    if(e.wires===0) tr.classList.add('failed');

    const medal=i<3?['🥇','🥈','🥉'][i]:i+1;
    const nameClass=i===0?'first-place':i===1?'second-place':i===2?'third-place':'';
    const pct=(e.wires/8)*100;
    const lockEmoji = e.totalAttempts === 8 ? ' 🔒' : '';
    
    // Format tentativa display
    let tentativaText = '';
    if (showBestOnly && e.totalAttempts) {
      // Show best attempt number of total attempts
      tentativaText = `${e.bestAttemptNumber}ª de ${e.totalAttempts}${lockEmoji}`;
    } else {
      // Show only the attempt number
      tentativaText = `${e.tentativa}ª${lockEmoji}`;
    }

    tr.innerHTML=`
      <td>${medal}</td>
      <td class="${nameClass}"><a href="#" class="student-link" data-name="${encodeURIComponent(e.name)}">${e.name}</a></td>
      <td>${e.minutes}m ${e.seconds}s</td>
      <td>${e.wires}/8<div class="bar"><div class="bar-fill" style="width:${pct}%"></div></div></td>
      <td>${tentativaText}</td>
      <td>${e.date}</td>`;

    tbody.appendChild(tr);
  });
}

render();
</script>
